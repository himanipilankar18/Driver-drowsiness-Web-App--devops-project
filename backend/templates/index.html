<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Monitoring Demo</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="container">
        <section class="panel">
            <h1>Driver Monitoring</h1>
            <p class="muted">Browser camera sends frames to FastAPI for processing.</p>
            <p id="httpWarning" class="warning" hidden>Camera may be blocked. Use Chrome flag or allow insecure origin.</p>

            <video id="preview" autoplay playsinline muted></video>
            <canvas id="frameCanvas" width="640" height="480" hidden></canvas>

            <div class="actions">
                <button id="startBtn" type="button">Start Monitoring</button>
                <button id="stopBtn" type="button" class="secondary" disabled>Stop Monitoring</button>
            </div>

            <div class="status">
                <p><strong>State:</strong> <span id="state">NORMAL</span></p>
                <p><strong>Fatigue Score:</strong> <span id="fatigue_score">0.00</span></p>
                <p><strong>Distraction Score:</strong> <span id="distraction_score">0.00</span></p>
                <p><strong>Face Detected:</strong> <span id="face_detected">false</span></p>
                <p id="error" class="error" hidden></p>
            </div>
        </section>
    </main>

    <script src="/static/script.js"></script>
</body>
</html>
