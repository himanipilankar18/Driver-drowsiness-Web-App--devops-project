<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Video Feed</title>
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
    <main class="container">
        <section class="panel">
            <div class="topbar">
                <div>
                    <h1>Live Video Feed</h1>
                    <p class="muted">MJPEG stream from the webcam with processed overlays.</p>
                </div>
                <a class="link-button" href="/">Back to Home</a>
            </div>

            <div class="stream-wrap">
                <img class="stream" src="/video/stream" alt="Driver safety stream">
            </div>

            <div class="status-strip">
                <span>State: <strong id="state">{{ status.state }}</strong></span>
                <span>Fatigue: <strong id="fatigue_score">{{ status.fatigue_score }}</strong></span>
                <span>Distraction: <strong id="distraction_score">{{ status.distraction_score }}</strong></span>
                <span id="message">{{ status.message }}</span>
            </div>
        </section>
    </main>

    <script>
        async function refreshStatus() {
            try {
                const response = await fetch('/status');
                const data = await response.json();
                document.getElementById('state').textContent = data.state;
                document.getElementById('fatigue_score').textContent = data.fatigue_score.toFixed(2);
                document.getElementById('distraction_score').textContent = data.distraction_score.toFixed(2);
                document.getElementById('message').textContent = data.message || '';
            } catch (error) {
                document.getElementById('message').textContent = 'Unable to refresh status.';
            }
        }

        refreshStatus();
        setInterval(refreshStatus, 2000);
    </script>
</body>
</html>
